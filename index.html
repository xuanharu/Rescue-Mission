<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Mission</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Layer -->
    <div class="bg-layer">
        <img src="img/main_page/main_page.webp" alt="" class="bg-img bg-desktop" aria-hidden="true">
        <img src="img/main_page/main_page_verticle.webp" alt="" class="bg-img bg-mobile" aria-hidden="true">
        <div class="bg-glow" aria-hidden="true"></div>
        <div class="stars-container" id="starsContainer" aria-hidden="true"></div>
        <div class="particles-container" id="particlesContainer" aria-hidden="true"></div>
        <div class="vignette" aria-hidden="true"></div>
    </div>

    <!-- Star Dust Layer -->
    <div class="star-dust-layer" id="starDustLayer" aria-hidden="true"></div>

    <!-- Flying Stars Layer -->
    <div class="flying-stars-layer" id="flyingStars" aria-hidden="true"></div>

    <!-- Main Menu -->
    <main class="menu-container">
        <nav class="menu-buttons" aria-label="Main menu">
            <button class="menu-btn" data-action="start" aria-label="Start Game">
        <img src="img/main_page/button.webp" alt="" class="btn-frame" aria-hidden="true">
        <img src="img/main_page/start_text.webp" alt="Start" class="btn-text">
      </button>

            <button class="menu-btn" data-action="save" aria-label="Save Menu">
        <img src="img/main_page/button.webp" alt="" class="btn-frame" aria-hidden="true">
        <img src="img/main_page/save_text.webp" alt="Save" class="btn-text">
      </button>

            <button class="menu-btn" data-action="equipments" aria-label="Equipment Menu">
        <img src="img/main_page/button.webp" alt="" class="btn-frame" aria-hidden="true">
        <img src="img/main_page/equipments_text.webp" alt="Equipments" class="btn-text">
      </button>
        </nav>
    </main>

    <script src="script.js"></script>

    <audio id="bgMusic" src="music/main-page.mp3" loop autoplay></audio>
</body>

</html>
