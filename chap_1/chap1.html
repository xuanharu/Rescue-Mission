<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Mission - Chapter 1</title>
    <link rel="icon" href="../img/logo.webp" type="image/webp">
    <link rel="stylesheet" href="chap1.css">
</head>

<body>

    <div class="game-container">

        <aside class="nav-panel">
            <button id="pauseBtn" class="nav-btn" title="Pause">⏸️</button>
            <button id="muteBtn" class="nav-btn" title="Mute">🔊</button>
            <button id="chaptersBtn" class="nav-btn" title="Chapters">📖</button>
            <button id="homeBtn" class="nav-btn" title="Home">🏠</button>
        </aside>

        <!-- =========================
         Main Area
    ========================== -->
        <main class="main-content">

            <!-- Coin -->
            <div class="coin-display">
                <img src="../img/coin.webp" class="coin-icon" alt="Coin">
                <span id="coinValue">100</span>
            </div>

            <!-- =====================
             Story Scene
        ====================== -->

            <section class="story-scene">
                <!-- Background -->
                <div class="background-layer">
                    <img id="storyBackground" class="story-background" src="" alt="Background">
                </div>

                <!-- Overlay -->
                <div id="sceneOverlay" class="scene-overlay">
                </div>

                <!-- Characters -->
                <div id="characterLayer" class="character-layer">
                    <!-- JS injects characters here -->
                </div>
            </section>

            <!-- =====================
             Dialogue
        ====================== -->
            <section class="dialogue-container">
                <div id="dialogueBox" class="dialogue-box speech">

                    <!-- Portrait -->
                    <div class="portrait-container">
                        <img id="speakerPortrait" class="speaker-portrait" src="" alt="Portrait">
                    </div>

                    <!-- Text -->
                    <div class="dialogue-content">
                        <div id="speakerName" class="speaker-name">
                            Người nói
                        </div>
                        <div id="dialogueText" class="dialogue-text">
                            Đoạn hội thoại sẽ được hiển thị ở đây. Nội dung sẽ thay đổi dựa trên các sự kiện trong trò chơi.
                        </div>
                        <button id="branchBtn" class="branch-btn" style="display:none;">Đi bộ về nhà</button>
                    </div>
                </div>

                <!-- Controls -->
                <div class="dialogue-controls">
                    <button id="previousBtn" class="dialogue-btn">
                    ← Quay lại
                </button>
                    <button id="nextBtn" class="dialogue-btn">
                    Tiếp tục →
                </button>
                </div>
            </section>

            <div id="pauseOverlay" class="pause-overlay" style="display:none;">
                <img src="../img/paused_screen.webp" alt="Paused" class="pause-image">
                <div class="pause-text">Nhấp vào để tiếp tục</div>
            </div>

        </main>
    </div>


    <script src="chap1_script.js"></script>
    <script src="chap1.js"></script>

    <audio id="bgMusic" src="../music/sad-piano.mp3" loop autoplay></audio>
</body>

</html>
