<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Mission - Choose Your Character</title>
    <link rel="stylesheet" href="chap0.css">
</head>

<body>

    <!-- Background Layer -->
    <div class="bg-layer">
        <div class="bg-glow" aria-hidden="true"></div>
        <div class="stars-container" id="starsContainer" aria-hidden="true"></div>
        <img class="space-ship" src="../img/space_ship.webp" alt="" aria-hidden="true">
        <div class="vignette" aria-hidden="true"></div>
    </div>

    <!-- Coin Display -->
    <div class="coin-display">
        <img src="../img/coin.webp" class="coin-icon" alt="Coin">
        <span id="coinValue">100</span>
    </div>

    <!-- Selection Screen -->
    <main class="select-container">

        <h1 class="title">CHỌN NHÂN VẬT</h1>
        <p class="subtitle">Hãy chọn người hùng của bạn và đặt tên cho họ</p>

        <section class="cards" id="cards">

            <button class="char-card" data-character="male" type="button" aria-pressed="false">
                <div class="char-frame">
                    <img class="char-img" src="../img/character/male_character_uniform_normal.webp" alt="Male character">
                </div>
            </button>

            <button class="char-card" data-character="female" type="button" aria-pressed="false">
                <div class="char-frame">
                    <img class="char-img" src="../img/character/female_character_uniform_normal.webp" alt="Female character">
                </div>
            </button>

        </section>

        <div class="name-field">
            <label for="charName">Tên nhân vật</label>
            <input id="charName" type="text" maxlength="20" placeholder="Nhập tên của bạn..." autocomplete="off">
        </div>

        <button id="saveBtn" class="save-btn" type="button">LƯU</button>

    </main>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirmModal" aria-hidden="true">
        <div class="modal-box">
            <h2 class="modal-title">XÁC NHẬN</h2>
            <p class="modal-text" id="modalText"></p>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cancelBtn" type="button">Hủy</button>
                <button class="modal-btn confirm" id="confirmBtn" type="button">Xác nhận</button>
            </div>
        </div>
    </div>

    <script src="chap0.js"></script>

    <audio id="bgMusic" src="../music/main-page.mp3" loop autoplay></audio>
</body>

</html>
